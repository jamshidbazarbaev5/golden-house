<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Map Pin Coordinate Picker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #fff; }
  
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #16213e; padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .toolbar h1 { font-size: 16px; font-weight: 600; }
  .toolbar .info { font-size: 13px; color: #9ca3af; }
  .toolbar .current { 
    background: #009688; color: #fff; padding: 4px 12px; 
    border-radius: 20px; font-weight: 700; font-size: 14px;
  }
  .toolbar button {
    padding: 6px 14px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-copy { background: #009688; color: #fff; }
  .btn-copy:hover { background: #00796b; }
  .btn-undo { background: #e53935; color: #fff; }
  .btn-undo:hover { background: #c62828; }
  .btn-clear { background: #555; color: #fff; }
  .btn-clear:hover { background: #777; }
  .btn-export { background: #1976d2; color: #fff; }
  .btn-export:hover { background: #1565c0; }

  .container {
    margin-top: 60px; padding: 20px;
    display: flex; gap: 20px; height: calc(100vh - 60px);
  }

  .map-area {
    flex: 1; position: relative; overflow: auto;
    background: #111; border-radius: 8px;
  }
  .map-area img {
    display: block; width: 100%; height: auto; cursor: crosshair;
  }

  .pin {
    position: absolute; transform: translate(-50%, -50%);
    width: 28px; height: 28px; border-radius: 50%;
    background: #009688; color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    pointer-events: none;
  }

  .sidebar {
    width: 340px; background: #16213e; border-radius: 8px;
    overflow-y: auto; padding: 16px;
  }
  .sidebar h2 { font-size: 14px; margin-bottom: 12px; color: #9ca3af; }
  .coord-list { list-style: none; }
  .coord-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 6px; margin-bottom: 4px;
    font-size: 13px; font-family: monospace;
  }
  .coord-list li:hover { background: rgba(255,255,255,0.05); }
  .coord-list .num {
    width: 24px; height: 24px; border-radius: 50%;
    background: #009688; color: #fff; font-size: 11px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .coord-list .coords { color: #e0e0e0; }

  #output {
    margin-top: 12px; padding: 12px; background: #0d1117;
    border-radius: 6px; font-size: 12px; font-family: monospace;
    color: #7ee787; white-space: pre-wrap; max-height: 200px;
    overflow-y: auto; display: none;
  }

  .labels-ref {
    margin-top: 16px; padding-top: 12px; border-top: 1px solid #333;
  }
  .labels-ref h3 { font-size: 12px; color: #9ca3af; margin-bottom: 8px; }
  .labels-ref .label-item {
    font-size: 12px; padding: 3px 0; color: #ccc;
  }
  .labels-ref .label-item span { color: #009688; font-weight: 700; margin-right: 8px; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>📍 Pin Picker</h1>
  <span class="info">Click on the map to place pin</span>
  <span class="current" id="currentPin">Next: #1</span>
  <button class="btn-undo" onclick="undo()">Undo</button>
  <button class="btn-clear" onclick="clearAll()">Clear All</button>
  <button class="btn-export" onclick="exportCode()">Export Code</button>
  <button class="btn-copy" onclick="copyCode()">Copy to Clipboard</button>
</div>

<div class="container">
  <div class="map-area" id="mapArea">
    <img src="jaslar.jpg" alt="Map" id="mapImg" />
  </div>
  
  <div class="sidebar">
    <h2>Placed Pins</h2>
    <ul class="coord-list" id="coordList"></ul>
    <pre id="output"></pre>
    
    <div class="labels-ref">
      <h3>Reference Labels (from image)</h3>
      <div id="labelsRef"></div>
    </div>
  </div>
</div>

<script>
const labels = [
  "Маҳаллий клиника",
  "Ихтисослашган мактаб",
  "Мактаб",
  "Садиқ",
  "Савдо саройи",
  "Савдо маркази",
  "Санатория",
  "Спорт зали ва стадион",
  "Рекреация зонаси",
  "Кўп тармоқли поликлиника",
  "Амфитеатр",
  "Маданий маркази",
  "Автотурар жой",
  "Умумий ресторан",
  "Ихтисослашган мактаб ва мактабгача",
  "Олий таълим муассасаси",
  "Экобозор",
  "Спорт мажмуаси ва кўнгилочар",
  "Саноат ҳудуди",
  "Подстанция (110 кВ)",
  "Ичимлик сув иншооти",
  "Кохонхона",
  "Оқавасув тозалаш иншооти",
  "Мавжуд турар-жой бинолари",
];

const pins = [];
const mapArea = document.getElementById('mapArea');
const mapImg = document.getElementById('mapImg');
const coordList = document.getElementById('coordList');
const currentPinEl = document.getElementById('currentPin');
const outputEl = document.getElementById('output');
const labelsRefEl = document.getElementById('labelsRef');

// Render reference labels
labels.forEach((label, i) => {
  labelsRefEl.innerHTML += `<div class="label-item"><span>${i + 1}</span>${label}</div>`;
});

mapImg.addEventListener('click', (e) => {
  const rect = mapImg.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
  
  const id = pins.length + 1;
  pins.push({ id, x: parseFloat(x), y: parseFloat(y) });
  
  renderPins();
  updateUI();
});

function renderPins() {
  // Remove existing pin elements
  document.querySelectorAll('.pin').forEach(el => el.remove());
  
  pins.forEach(pin => {
    const el = document.createElement('div');
    el.className = 'pin';
    el.style.left = pin.x + '%';
    el.style.top = pin.y + '%';
    el.textContent = pin.id;
    mapArea.appendChild(el);
  });
}

function updateUI() {
  currentPinEl.textContent = `Next: #${pins.length + 1}`;
  
  coordList.innerHTML = '';
  pins.forEach(pin => {
    const label = labels[pin.id - 1] || '—';
    coordList.innerHTML += `
      <li>
        <span class="num">${pin.id}</span>
        <span class="coords">x: ${pin.x}%, y: ${pin.y}%</span>
        <span style="color:#777;font-size:11px;margin-left:4px">${label}</span>
      </li>`;
  });
}

function undo() {
  pins.pop();
  renderPins();
  updateUI();
  outputEl.style.display = 'none';
}

function clearAll() {
  if (!confirm('Clear all pins?')) return;
  pins.length = 0;
  renderPins();
  updateUI();
  outputEl.style.display = 'none';
}

function generateCode() {
  let code = 'const legend: LegendItem[] = [\n';
  pins.forEach(pin => {
    const label = labels[pin.id - 1] || `Item ${pin.id}`;
    const pad = ' '.repeat(Math.max(0, 45 - label.length));
    code += `  { id: ${pin.id.toString().padStart(2)}, label: "${label}",${pad} x: ${pin.x.toString().padStart(5)},  y: ${pin.y.toString().padStart(5)} },\n`;
  });
  code += '];';
  return code;
}

function exportCode() {
  const code = generateCode();
  outputEl.textContent = code;
  outputEl.style.display = 'block';
}

function copyCode() {
  const code = generateCode();
  navigator.clipboard.writeText(code).then(() => {
    alert('Copied to clipboard! Paste it into HeroSection.tsx');
  });
}
</script>
</body>
</html>
